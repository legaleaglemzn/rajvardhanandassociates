<head>

  <!-- Google Fonts + Tailwind + GSAP + Custom Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- GSAP for advanced animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }
    body {
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
    /* custom gold theme */
    .gold-text { color: #F5B041; }
    .gold-bg { background: #F5B041; }
    .gold-border { border-color: #F5B041; }
    .gold-glow { box-shadow: 0 0 15px rgba(245, 176, 65, 0.4); }
    .glass-card {
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(245, 176, 65, 0.25);
      border-radius: 28px;
    }
    .custom-cursor, .cursor-ring {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
    }
    .custom-cursor {
      width: 8px;
      height: 8px;
      background: #F5B041;
      box-shadow: 0 0 12px #F5B041;
    }
    .cursor-ring {
      width: 42px;
      height: 42px;
      border: 2px solid rgba(245, 176, 65, 0.6);
      transition: 0.12s ease-out;
    }
    @media (max-width: 768px) {
      .custom-cursor, .cursor-ring { display: none; }
      * { cursor: auto; }
    }
    .reveal, .reveal-left, .reveal-right, .reveal-scale {
      opacity: 0;
      transition: all 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }
    .reveal { transform: translateY(50px); }
    .reveal-left { transform: translateX(-50px); }
    .reveal-right { transform: translateX(50px); }
    .reveal-scale { transform: scale(0.92); }
    .visible {
      opacity: 1 !important;
      transform: translateY(0) translateX(0) scale(1) !important;
    }
    .marquee-track {
      display: inline-flex;
      white-space: nowrap;
      animation: marquee 35s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .tilt-3d {
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      will-change: transform;
    }
    .floating-shape {
      position: absolute;
      background: radial-gradient(circle, rgba(245,176,65,0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }
    .hero-parallax {
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
    }
    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #F5B041; border-radius: 10px; }
  </style>
</head>

        return () => window.removeEventListener('scroll', onScroll);

      const linkLabels = ['HOME', 'ABOUT', 'EXPERTISE', 'PRACTICE', 'PROCESS', 'WHY US', 'SUCCESS', 'CONTACT'];

        <>
          <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/80 backdrop-blur-xl py-2 shadow-2xl' : 'bg-transparent py-5'}`}>

    }

    // Footer
    function Footer() {
      return (<footer className="bg-black/90 py-12 border-t border-gray-800 text-center text-gray-400 text-sm"><div className="container mx-auto"><div className="flex flex-wrap justify-center gap-8 mb-6"><span>© 2014–2026 RAJVARDHAN & ASSOCIATES</span><span className="gold-text">सत्यमेव जयते</span></div></div></footer>);
    }

    // Main App
    function App() {
      const [preloaderDone, setPreloaderDone] = useState(false);
      const [showBackTop, setShowBackTop] = useState(false);
      const cursorRef = useRef(null);
      const ringRef = useRef(null);

      useEffect(() => {
        let prog = 0;
        const bar = document.getElementById('preBar');
        const iv = setInterval(() => { prog += Math.random()*4+2; if(prog>=100){ prog=100; clearInterval(iv); setTimeout(()=>setPreloaderDone(true),500); } if(bar) bar.style.width = prog+'%'; }, 30);
        return ()=>clearInterval(iv);
      }, []);

      useEffect(() => {
        const move = (e) => { if(cursorRef.current){ cursorRef.current.style.left = e.clientX-4+'px'; cursorRef.current.style.top = e.clientY-4+'px'; } if(ringRef.current){ setTimeout(()=>{ ringRef.current.style.left = e.clientX-21+'px'; ringRef.current.style.top = e.clientY-21+'px'; },60); } };
        window.addEventListener('mousemove', move);
        return ()=>window.removeEventListener('mousemove', move);
      }, []);

      useEffect(() => {
        const observer = new IntersectionObserver((entries) => entries.forEach(e => e.isIntersecting && e.target.classList.add('visible')), { threshold: 0.12 });
        document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => observer.observe(el));
        return ()=>observer.disconnect();
      }, [preloaderDone]);

      useEffect(() => {
        const handleScroll = () => setShowBackTop(window.scrollY > 1000);
        window.addEventListener('scroll', handleScroll);
        return ()=>window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        const cards = document.querySelectorAll('.tilt-3d');
        const onMove = (e) => { const card = e.currentTarget; const rect = card.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top; const rx = ((y - rect.height/2)/rect.height)*-12, ry = ((x - rect.width/2)/rect.width)*12; card.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-8px) scale(1.02)`; };
        const onLeave = (e) => { e.currentTarget.style.transform = ''; };
        cards.forEach(c => { c.addEventListener('mousemove', onMove); c.addEventListener('mouseleave', onLeave); });
        return ()=> cards.forEach(c => { c.removeEventListener('mousemove', onMove); c.removeEventListener('mouseleave', onLeave); });
      }, [preloaderDone]);

      return (<>
        <div ref={cursorRef} className="custom-cursor"></div><div ref={ringRef} className="cursor-ring"></div>
        {!preloaderDone && <Preloader done={preloaderDone} />}
        <Navbar /><Marquee /><HeroSection /><AboutSection /><ExpertiseSection /><PracticeSection /><ProcessSection /><WhyUsSection /><Testimonials /><ContactSection /><Footer />
        {showBackTop && <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="fixed bottom-8 right-8 gold-bg text-black w-12 h-12 rounded-full shadow-2xl z-40 text-2xl">↑</button>}
      </>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
